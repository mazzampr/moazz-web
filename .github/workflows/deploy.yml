name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 45m
          script: |
            echo "=========================================="
            echo "🚀 Starting Smart Deployment"
            echo "=========================================="
            
            # Navigate to app directory
            cd ~/moazz-web
            
            # Pull latest code
            echo "⬇️  Pulling latest code..."
            git pull origin main
            
            # Always update .env file with latest secrets from GitHub
            echo "📄 Updating .env file with latest secrets..."
            cat > .env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
            EOF
            
            echo "✅ .env file updated with latest secrets"
            
            echo ""
            echo "=========================================="
            echo "🔨 FULL REBUILD"
            echo "=========================================="
            echo "This will take approximately 20-30 minutes..."
            echo ""
            
            # Stop existing containers
            echo "🛑 Stopping containers..."
            docker compose -f docker-compose.prod.yml down
            
            # Remove old images to save space
            echo "🧹 Cleaning up old images..."
            docker image prune -af
            
            # Build new images without cache
            echo "🔨 Building new images (no cache)..."
            docker compose -f docker-compose.prod.yml build --no-cache
            
            # Start containers
            echo "▶️  Starting containers with new images..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo ""
            echo "=========================================="
            echo "📊 Deployment Status"
            echo "=========================================="
            
            # Wait for containers to be ready
            echo "⏳ Waiting for containers to be healthy..."
            sleep 10
            
            # Show status
            docker compose -f docker-compose.prod.yml ps
            
            echo ""
            echo "=========================================="
            echo "📋 Recent Logs (Last 30 lines)"
            echo "=========================================="
            
            # Show logs for verification
            docker compose -f docker-compose.prod.yml logs --tail=30
            
            echo ""
            echo "=========================================="
            echo "✅ Deployment Complete!"
            echo "=========================================="
            echo "Deployed with FULL REBUILD"
            echo "Website: https://moazz.dev"

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Your app is now live at https://moazz.dev"
          
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
          echo "Common issues:"
          echo "  - SSH connection failed (check VPS_HOST, VPS_USERNAME, VPS_SSH_KEY secrets)"
          echo "  - Docker build timeout (check VPS resources)"
          echo "  - Container health check failed (check application logs)"
